<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>KubasaurusTank</title>
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
                   minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="touch-action" content="none">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        * {
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
        }
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0a0e0a;
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #splash {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #0a0e0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.6s ease-out;
        }
        #splash.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #splash .bg-img {
            position: absolute;
            max-width: 80%;
            max-height: 60%;
            border-radius: 12px;
            opacity: 0.7;
            filter: brightness(0.8);
        }
        #splash .overlay {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #splash .title {
            font-family: 'Press Start 2P', monospace;
            color: #66ff66;
            font-size: 28px;
            text-shadow: 2px 2px 8px #000, 0 0 20px #006600;
        }
        #splash .subtitle {
            font-family: 'Press Start 2P', monospace;
            color: #ffcc00;
            font-size: 18px;
            margin-top: 10px;
            text-shadow: 2px 2px 6px #000;
        }
        #progress-bar {
            width: 200px;
            height: 6px;
            background: rgba(26, 42, 26, 0.8);
            border-radius: 3px;
            margin-top: 30px;
            overflow: hidden;
        }
        #progress-fill {
            width: 0%;
            height: 100%;
            background: #66cc66;
            border-radius: 3px;
            transition: width 0.3s;
        }
        #splash .hint {
            font-family: 'Press Start 2P', monospace;
            color: #557755;
            font-size: 8px;
            margin-top: 15px;
            text-shadow: 1px 1px 4px #000;
        }
    </style>
</head>
<body>
<div id="splash">
    <img class="bg-img" src="splash_bg.jpg" alt="">
    <div class="overlay">
        <div class="title">KUBASAURUS</div>
        <div class="subtitle">T A N K</div>
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <div class="hint">loading...</div>
    </div>
</div>
<canvas id="canvas"></canvas>
<script>
    let progress = 0;
    const progressFill = document.getElementById('progress-fill');
    const progressInterval = setInterval(() => {
        progress = Math.min(progress + Math.random() * 8, 90);
        progressFill.style.width = progress + '%';
    }, 200);

    let gameReady = false;
    async function start() {
        main();
        gameReady = true;
    }

    // Poll canvas for actual rendered content before hiding splash
    function checkGameRendered() {
        if (!gameReady) {
            requestAnimationFrame(checkGameRendered);
            return;
        }
        // Give the game 2 frames to render
        let frames = 0;
        function waitFrames() {
            frames++;
            if (frames < 10) {
                requestAnimationFrame(waitFrames);
                return;
            }
            clearInterval(progressInterval);
            progressFill.style.width = '100%';
            setTimeout(() => {
                document.getElementById('splash').classList.add('hidden');
                setTimeout(() => {
                    const s = document.getElementById('splash');
                    if (s) s.remove();
                }, 700);
            }, 300);
        }
        requestAnimationFrame(waitFrames);
    }
    requestAnimationFrame(checkGameRendered);

    window.addEventListener("load", start);
    document.addEventListener("gesturestart", e => e.preventDefault());
    document.addEventListener("gesturechange", e => e.preventDefault());
    document.addEventListener("gestureend", e => e.preventDefault());
    document.addEventListener("touchmove", e => e.preventDefault(), {passive: false});
    function resizeCanvas() {
        const canvas = document.getElementById("canvas");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();
</script>
<script type="text/javascript" charset="utf-8" src="app.js"></script>
</body>
</html>
